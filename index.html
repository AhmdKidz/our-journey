<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 1st Anniversary! ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background-color: #fdf2f8; color: #333; text-align: center; overflow-x: hidden; }
        
        /* Layar Pembuka */
        #welcome-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #fce7f3; z-index: 100; position: relative; }
        #welcome-screen h1 { font-family: 'Dancing Script', cursive; font-size: 40px; color: #db2777; margin-bottom: 20px; padding: 0 20px; }
        button { padding: 15px 35px; font-size: 18px; font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer; border-radius: 30px; border: none; background-color: #ec4899; color: white; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4); transition: 0.3s; z-index: 10; }
        button:hover { background-color: #db2777; transform: scale(1.05); }
        
        /* Halaman Utama */
        #memories { display: none; padding: 50px 20px; position: relative; }
        h2 { font-family: 'Dancing Script', cursive; font-size: 45px; color: #be185d; margin-bottom: 10px; }
        p.subtitle { font-size: 16px; max-width: 600px; margin: 0 auto 30px; line-height: 1.6; color: #555; }
        
        /* Counter Waktu Bersama */
        #timer { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; z-index: 10; position: relative; }
        .time-box { background: #fbcfe8; padding: 10px 15px; border-radius: 10px; color: #9d174d; font-weight: bold; min-width: 60px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .time-box span { display: block; font-size: 12px; font-weight: normal; color: #831843; }

        /* Slideshow Foto */
        .slideshow-container { max-width: 350px; position: relative; margin: auto; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 25px rgba(219, 39, 119, 0.2); border: 8px solid white; z-index: 10; background: white;}
        .mySlides { display: none; }
        .mySlides img { width: 100%; height: auto; display: block; object-fit: cover; }
        
        /* Efek Animasi Fade */
        .fade { animation-name: fade; animation-duration: 2s; }
        @keyframes fade { from {opacity: .3} to {opacity: 1} }

        /* Animasi Hujan Hati */
        .hearts { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .heart { position: absolute; color: #f472b6; animation: fall linear infinite; opacity: 0; }
        @keyframes fall {
            0% { transform: translateY(-10vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(110vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1>Untuk kesayanganku, Salma...</h1>
        <button onclick="startJourney()">Buka Kejutan 💌</button>
    </div>

    <div id="memories">
        <div class="hearts" id="hearts-container"></div>

        <h2>Happy 1st Anniversary! ❤️</h2>
        <p class="subtitle">365 hari bersamamu adalah petualangan terbaikku. Terima kasih sudah menjadi alasan senyumku setiap hari.</p>
        
        <div id="timer">
            <div class="time-box"><div id="days">00</div><span>Hari</span></div>
            <div class="time-box"><div id="hours">00</div><span>Jam</span></div>
            <div class="time-box"><div id="minutes">00</div><span>Menit</span></div>
            <div class="time-box"><div id="seconds">00</div><span>Detik</span></div>
        </div>

        <div class="slideshow-container">
            <div class="mySlides fade">
                <img src="foto1.jpg" alt="Memori 1">
            </div>
            <div class="mySlides fade">
                <img src="foto2.jpg" alt="Memori 2">
            </div>
            <div class="mySlides fade">
                <img src="foto3.jpg" alt="Memori 3">
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startJourney() {
            document.getElementById("bg-music").play();
            document.getElementById("welcome-screen").style.display = "none";
            document.getElementById("memories").style.display = "block";
            showSlides();
            createHearts(); 
        }

        let slideIndex = 0;
        function showSlides() {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";  
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            slides[slideIndex-1].style.display = "block";  
            setTimeout(showSlides, 3500); 
        }

        // --- PENTING: GANTI TANGGAL DI BAWAH INI ---
        // Format (Tahun-Bulan-TanggalTJam:Menit:Detik)
        // Karena kalian anniversary ke-1 besok, masukkan tanggal jadian tahun lalu.
        // Contoh di bawah adalah 25 Juni 2023. Ubah sesuai tanggal asli kalian!
        const startDate = new Date("2025-06-25T00:00:00").getTime(); 

        setInterval(function() {
            const now = new Date().getTime();
            const distance = now - startDate;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;
        }, 1000);

        function createHearts() {
            const heartsContainer = document.getElementById("hearts-container");
            setInterval(() => {
                const heart = document.createElement("div");
                heart.classList.add("heart");
                heart.innerHTML = "❤️";
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = (Math.random() * 3 + 3) + "s"; 
                heart.style.fontSize = (Math.random() * 15 + 10) + "px"; 
                heartsContainer.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 6000);
            }, 400); 
        }
    </script>
</body>
</html>

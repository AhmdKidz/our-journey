<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 1st Anniversary! ❤️</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdf2f8; color: #333; text-align: center; }
        
        /* Desain Layar Pembuka */
        #welcome-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #fce7f3; }
        #welcome-screen h1 { font-size: 24px; color: #db2777; margin-bottom: 20px; padding: 0 20px; }
        button { padding: 15px 35px; font-size: 18px; cursor: pointer; border-radius: 30px; border: none; background-color: #ec4899; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        button:hover { background-color: #db2777; transform: scale(1.05); }
        
        /* Desain Halaman Utama */
        #memories { display: none; padding: 50px 20px; }
        h2 { color: #be185d; }
        p { font-size: 18px; max-width: 600px; margin: 0 auto 30px; line-height: 1.6; }
        
        /* Desain Slideshow Foto */
        .slideshow-container { max-width: 400px; position: relative; margin: auto; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.15); border: 5px solid white; }
        .mySlides { display: none; }
        .mySlides img { width: 100%; height: auto; display: block; object-fit: cover; }
        
        /* Efek Transisi Animasi */
        .fade { animation-name: fade; animation-duration: 1.5s; }
        @keyframes fade { from {opacity: .4} to {opacity: 1} }
    </style>
</head>
<body>

    <!-- LAYAR PEMBUKA (Agar musik bisa otomatis menyala setelah diklik) -->
    <div id="welcome-screen">
        <h1>Hai sayang, ada sesuatu untukmu...</h1>
        <button onclick="startJourney()">Buka Pesan 💌</button>
    </div>

    <!-- LAYAR UTAMA (Akan muncul setelah tombol diklik) -->
    <div id="memories">
        <h2>Happy 1st Anniversary! ❤️</h2>
        <!-- Kamu bisa mengubah kata-kata di bawah ini sesuai keinginanmu -->
        <p>Terima kasih sudah menjadi bagian terindah dalam satu tahun terakhir. Ini adalah sedikit kenangan manis dari perjalanan kita. I love you!</p>
        
        <!-- Wadah Slideshow Foto -->
        <div class="slideshow-container">
            <div class="mySlides fade">
                <img src="foto1.jpg" alt="Memori 1">
            </div>
            <div class="mySlides fade">
                <img src="foto2.jpg" alt="Memori 2">
            </div>
            <div class="mySlides fade">
                <img src="foto3.jpg" alt="Memori 3">
            </div>
        </div>
    </div>

    <!-- AUDIO FILE -->
    <audio id="bg-music" loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Logika untuk memulai musik dan memunculkan memori
        function startJourney() {
            document.getElementById("bg-music").play();
            document.getElementById("welcome-screen").style.display = "none";
            document.getElementById("memories").style.display = "block";
            showSlides(); // Mulai jalankan slideshow foto
        }

        // Logika agar foto berganti otomatis
        let slideIndex = 0;
        function showSlides() {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";  
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            slides[slideIndex-1].style.display = "block";  
            setTimeout(showSlides, 3500); // Angka 3500 berarti foto berganti setiap 3,5 detik
        }
    </script>

</body>
</html>
